name: Docker

# Images publish only from an annotated release tag — main collects features
# between releases (see dotmage-spec RELEASING.md). install.sh pulls :latest,
# so :latest must move only when a release is cut.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Semver tag fan-out instead of one mutable :latest — users pin what they
      # want to ride: :2.1.0 (immutable), :2.1, :2 (install.sh default), :dev.
      - name: Derive image tags
        id: tags
        run: |
          IMAGE=ghcr.io/dotmage/server
          V="${GITHUB_REF_NAME#v}"                # 2.1.0 | 2.2.0-dev.1
          if [[ "$V" == *-* ]]; then
            echo "tags=${IMAGE}:${V},${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          else
            MAJOR="${V%%.*}"; MINOR="${V%.*}"
            echo "tags=${IMAGE}:${V},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
