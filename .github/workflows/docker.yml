name: Docker

# Images publish only from an annotated release tag — main collects features
# between releases (see dotmage-spec RELEASING.md). install.sh pulls :latest,
# so :latest must move only when a release is cut.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dotmage/server:latest
            ghcr.io/dotmage/server:${{ github.ref_name }}
            ghcr.io/dotmage/server:${{ github.sha }}
