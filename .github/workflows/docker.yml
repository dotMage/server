name: Docker

# Images publish only from an annotated release tag — main collects features
# between releases (see dotmage-spec RELEASING.md). install.sh pins the major
# (:2), so patch/minor updates ride `docker compose pull`.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Semver tag fan-out instead of one mutable :latest — users pin what they
      # want to ride: :2.1.0 (immutable), :2.1, :2 (install.sh default), :dev.
      - name: Derive image tags
        id: tags
        run: |
          IMAGE=ghcr.io/dotmage/server
          V="${GITHUB_REF_NAME#v}"                # 2.1.0 | 2.2.0-dev.1
          if [[ "$V" == *-* ]]; then
            echo "tags=${IMAGE}:${V},${IMAGE}:dev" >> "$GITHUB_OUTPUT"
          else
            MAJOR="${V%%.*}"; MINOR="${V%.*}"
            echo "tags=${IMAGE}:${V},${IMAGE}:${MINOR},${IMAGE}:${MAJOR},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # Publish a GitHub Release for the tag so the admin panel's update banner
  # (and anything reading /releases/latest) has a source of truth. Dev tags
  # (2.2.0-dev.1) are flagged prerelease, so /releases/latest keeps returning
  # the newest stable — mirrors the CLI's stable/dev channel split.
  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${GITHUB_REF_NAME#v}"
          PRE=""
          [[ "$V" == *-* ]] && PRE="--prerelease"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes $PRE
